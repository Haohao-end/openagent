services:
  llmops-ui:
    image: llmops-ui:${IMAGE_VERSION:-0.1.0}
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: llmops-ui
    restart: always
    ports:
      - "${UI_PORT:-3000}:3000"

  llmops-api:
    image: llmops-api:${IMAGE_VERSION:-0.1.0}
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: llmops-api
    restart: always
    volumes:
      - ./volumes/app/storage:/app/api/storage
    # 从 api/.env 读取所有业务配置
    env_file:
      - ../api/.env
    environment:
      # Docker 环境特定配置（覆盖 api/.env 中的对应配置）
      MODE: api
      MIGRATION_ENABLED: 'true'
      # 数据库连接使用 Docker 服务名
      SQLALCHEMY_DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-llmops123456}@llmops-db:5432/${POSTGRES_DB:-llmops}?client_encoding=utf8
      # Redis 连接使用 Docker 服务名
      REDIS_HOST: llmops-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-llmops123456}
      # Weaviate 连接使用 Docker 服务名
      WEAVIATE_HTTP_HOST: llmops-weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: llmops-weaviate
      WEAVIATE_GRPC_PORT: 50051
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-ftBC9hKkjfdbdi0W3T6kEtMh5BZFpGa1DF8}
    ports:
      - "${API_PORT:-5001}:5001"
    depends_on:
      llmops-db:
        condition: service_healthy
      llmops-redis:
        condition: service_healthy
      llmops-weaviate:
        condition: service_started

  llmops-celery:
    image: llmops-api:${IMAGE_VERSION:-0.1.0}
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: llmops-celery
    restart: always
    volumes:
      - ./volumes/app/storage:/app/api/storage
    # 从 api/.env 读取所有业务配置
    env_file:
      - ../api/.env
    environment:
      # Docker 环境特定配置（覆盖 api/.env 中的对应配置）
      MODE: celery
      MIGRATION_ENABLED: 'false'
      # 数据库连接使用 Docker 服务名
      SQLALCHEMY_DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-llmops123456}@llmops-db:5432/${POSTGRES_DB:-llmops}?client_encoding=utf8
      # Redis 连接使用 Docker 服务名
      REDIS_HOST: llmops-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-llmops123456}
      # Weaviate 连接使用 Docker 服务名
      WEAVIATE_HTTP_HOST: llmops-weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: llmops-weaviate
      WEAVIATE_GRPC_PORT: 50051
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-ftBC9hKkjfdbdi0W3T6kEtMh5BZFpGa1DF8}
    depends_on:
      llmops-db:
        condition: service_healthy
      llmops-redis:
        condition: service_healthy
      llmops-weaviate:
        condition: service_started

  llmops-redis:
    image: redis:6-alpine
    restart: always
    container_name: llmops-redis
    volumes:
      - ./volumes/redis/data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-llmops123456}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  llmops-db:
    image: postgres:15-alpine
    restart: always
    container_name: llmops-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmops123456}
      POSTGRES_DB: ${POSTGRES_DB:-llmops}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data/pgdata
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  llmops-weaviate:
    image: semitechnologies/weaviate:1.28.4
    container_name: llmops-weaviate
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'false'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODEL: 'none'
      CLUSTER_HOSTNAME: 'node1'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:-ftBC9hKkjfdbdi0W3T6kEtMh5BZFpGa1DF8}
      AUTHENTICATION_APIKEY_USERS: ${WEAVIATE_USER:-2227625024@qq.com}
      AUTHORIZATION_ADMINLIST_ENABLED: 'true'
      AUTHORIZATION_ADMINLIST_USERS: ${WEAVIATE_USER:-2227625024@qq.com}
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    ports:
      - "${WEAVIATE_HTTP_PORT:-8080}:8080"
      - "${WEAVIATE_GRPC_PORT:-50051}:50051"

  llmops-nginx:
    image: nginx:latest
    restart: always
    container_name: llmops-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/ssl
    depends_on:
      - llmops-ui
      - llmops-api
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
