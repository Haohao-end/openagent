[pytest]
# 设置测试缓存文件存储在 tmp/.pytest_cache 中
cache_dir = tmp/.pytest_cache
testpaths = test
python_files = test_*.py

# 默认保留 handler/service 的覆盖率报告，但不再用全局 100% 覆盖率阻断本地/主干 pytest。
addopts = -v -s --cov=internal.handler --cov=internal.service --cov-branch --cov-report=term-missing:skip-covered --cov-report=xml:tmp/coverage.xml

# 关键时间 API 退化为错误，避免 utcnow/utcfromtimestamp 回归。
filterwarnings =
    error:datetime\\.datetime\\.utcnow\\(\\) is deprecated:DeprecationWarning
    error:datetime\\.datetime\\.utcfromtimestamp\\(\\) is deprecated:DeprecationWarning
    ignore::requests.exceptions.RequestsDependencyWarning
    ignore:pkg_resources is deprecated as an API.*:UserWarning
    ignore:Using default key encoder.*:UserWarning
    ignore::DeprecationWarning:<frozen importlib\\._bootstrap>
    ignore:Pydantic serializer warnings.*:UserWarning
