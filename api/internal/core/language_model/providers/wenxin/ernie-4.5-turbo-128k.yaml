model: ernie-4.5-turbo-128k
label: ernie-4.5-turbo-128k
model_type: chat
features:
  - tool_call
  - agent_thought
context_window: 128000
max_output_tokens: 8192
attributes:
  model: ERNIE-4.5-Turbo-128K
parameters:
  - name: temperature
    use_template: temperature
    max: 1
    default: 0.8
  - name: top_p
    use_template: top_p
  - name: penalty_score
    label: 惩罚系数
    type: float
    help: 重复惩罚参数，数值越高对重复内容抑制越强。
    required: false
    default: 1.0
    min: 1.0
    max: 2.0
    precision: 2
    options: []
  - name: max_output_tokens
    use_template: max_tokens
    default: 4096
    max: 8192
  - name: disable_search
    label: 禁用搜索
    type: boolean
    help: 禁用模型自行进行外部搜索。
    required: false
    default: false
metadata:
  pricing:
    input: 0.0
    output: 0.0
    unit: 0.001
    currency: RMB
  pricing_note: 官方文档未公开该模型精确API单价，待官方发布后更新。
