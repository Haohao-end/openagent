model: ernie-4.0-8k
label: ernie-4.0-8k
model_type: chat
features:
  - agent_thought
context_window: 8192
max_output_tokens: 2048
attributes:
  model: ERNIE-4.0-8K
parameters:
  - name: temperature
    use_template: temperature
    max: 1
    default: 0.8
  - name: top_p
    use_template: top_p
  - name: penalty_score
    label: 惩罚系数
    type: float
    help: 重复惩罚参数，数值越高对重复内容抑制越强。
    required: false
    default: 1.0
    min: 1.0
    max: 2.0
    precision: 2
    options: []
  - name: max_output_tokens
    use_template: max_tokens
    default: 2048
    max: 2048
  - name: disable_search
    label: 禁用搜索
    type: boolean
    help: 禁用模型自行进行外部搜索。
    required: false
    default: false
metadata:
  pricing:
    input: 0.1200
    output: 0.1200
    unit: 0.001
    currency: RMB
