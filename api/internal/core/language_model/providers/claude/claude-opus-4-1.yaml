model: claude-opus-4-1
label: claude-opus-4-1
model_type: chat
features:
  - tool_call
  - agent_thought
  - image_input
context_window: 200000
max_output_tokens: 64000
attributes:
  model: claude-opus-4-1
parameters:
  - name: temperature
    use_template: temperature
    default: 1
  - name: top_p
    use_template: top_p
    default: 1
  - name: top_k
    label: Top K
    type: int
    help: 仅从概率最高的前K个候选中采样。
    required: false
    default: 40
    min: 1
    max: 500
    precision: 0
    options: []
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    max: 64000
metadata:
  pricing:
    input: 0.015
    output: 0.075
    unit: 0.001
    currency: USD
