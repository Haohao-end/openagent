model: gpt-5.2
label: gpt-5.2
model_type: chat
features:
  - tool_call
  - agent_thought
  - image_input
context_window: 400000
max_output_tokens: 128000
attributes:
  model: gpt-5.2
parameters:
  - name: temperature
    use_template: temperature
    default: 1
  - name: top_p
    use_template: top_p
    default: 1
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    max: 128000
metadata:
  pricing:
    input: 0.002
    output: 0.008
    unit: 0.001
    currency: USD
  pricing_cache_hit:
    input: 0.0005
    output: 0.008
    unit: 0.001
    currency: USD
