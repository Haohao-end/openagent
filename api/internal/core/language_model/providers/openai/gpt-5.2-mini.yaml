model: gpt-5.2-mini
label: gpt-5.2-mini
model_type: chat
features:
  - tool_call
  - agent_thought
  - image_input
context_window: 400000
max_output_tokens: 128000
attributes:
  model: gpt-5.2-mini
parameters:
  - name: temperature
    use_template: temperature
    default: 1
  - name: top_p
    use_template: top_p
    default: 1
  - name: max_tokens
    use_template: max_tokens
    default: 8192
    max: 128000
metadata:
  pricing:
    input: 0.0004
    output: 0.0016
    unit: 0.001
    currency: USD
  pricing_cache_hit:
    input: 0.0001
    output: 0.0016
    unit: 0.001
    currency: USD
