model: deepseek-r1:8b
label: deepseek-r1:8b
model_type: chat
features:
  - agent_thought
context_window: 131072
max_output_tokens: 8192
attributes:
  model: "deepseek-r1:8b"
parameters:
  - name: temperature
    use_template: temperature
    default: 0.6
  - name: top_p
    use_template: top_p
    default: 0.95
  - name: num_ctx
    label: 上下文窗口
    type: int
    help: Ollama推理上下文窗口大小。
    required: false
    default: 32768
    min: 1024
    max: 131072
    precision: 0
    options: []
  - name: num_predict
    label: 最大生成Token
    type: int
    help: Ollama接口中的最大输出token数量（num_predict）。
    required: false
    default: 4096
    min: 1
    max: 8192
    precision: 0
    options: []
metadata:
  pricing:
    input: 0.0000
    output: 0.0000
    unit: 0.001
    currency: RMB
